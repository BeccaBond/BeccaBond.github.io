<!DOCTYPE HTML>
<html>
    <head>
        <title>Contact – Becca Bond</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="/assets/css/main.css" />
    </head>
    <body class="is-preload">

        <!-- Navbar -->
        <nav id="navbar">
            <div class="nav-inner">
                <a href="/" class="nav-logo">Becca Bond</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>        
                    <li><a href="/resume">Resume</a></li>
                    <li><a href="/projects">Projects</a></li>
                    <li><a href="/contact">Contact</a></li>
                </ul>
            </div>
        </nav>

        <!-- Header -->
        <header id="header">
            <img src="/images/drawing.jpg" class="header-bg" alt="" />
            <div class="header-overlay"></div>
            <div class="inner">
                <h1>Contact Me</h1>
            </div>
        </header>

        <!-- Main -->
        <main id="main">
            <section id="contact">
                <div class="row">

                    <!-- Left: Form -->
                    <div class="col-6">
						<h2 class="contact-col-title">Let's Talk</h2>
                        <form action="https://formspree.io/f/xkoankzv" method="POST">
                            <div class="contact-field">
                                <label for="name">Name</label>
                                <input type="text" name="name" id="name" placeholder="Your Name" />
                            </div>
                            <div class="contact-field">
                                <label for="email">Email</label>
                                <input type="email" name="email" id="email" placeholder="your@email.com" />
                            </div>
                            <div class="contact-field">
                                <label for="message">Message</label>
                                <textarea name="message" id="message" rows="6" placeholder="Your message..."></textarea>
                            </div>
                            <input type="submit" value="Send Message" class="btn-download" />
                        </form>
                    </div>

                    <!-- Right: Photo + Contact Info -->
                    <div class="col-6" id="contact-info">
						<h2 class="contact-col-title">Contact Info</h2>
                        <ul class="contact-list">
                            <li>
                                <a href="https://www.linkedin.com/in/becca-bond-shakennotstirred/" target="_blank" class="contact-link">
                                    <span class="icon brands fa-linkedin"></span>
                                    LinkedIn
                                </a>
                            </li>
                            <li>
                                <a href="mailto:bbond@olin.edu" class="contact-link">
                                    <span class="icon solid fa-envelope"></span>
                                    bbond@olin.edu
                                </a>
                            </li>
                            <li class="contact-link">
                                <span class="icon solid fa-phone"></span>
                                (928) 308-9999
                            </li>
                        </ul>
                    </div>

                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer id="footer">
            <nav class="footer-nav">
                <a href="/">Home</a>
				<a href="/resume">Resume</a>
                <a href="/projects">Projects</a>
            </nav>
            <p class="footer-copyright">&copy; 2026 Becca Bond</p>
        </footer>

    </body>
</html>
